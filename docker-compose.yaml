version: '3'

services:
  selenium-hub:
    image: selenium/hub
    container_name: selenium-hub
    ports:
      - "4442-4444:4442-4444"
    networks:
      - grid

  node-chromium:
   image: seleniarm/node-chromium
   container_name: node-chromium
   environment:
    - SE_EVENT_BUS_HOST=selenium-hub
    - SE_EVENT_BUS_PUBLISH_PORT=4442
    - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
   shm_size: '2gb'
   depends_on:
    - selenium-hub
   networks:
    - grid

  node-firefox:
    image: selenium/node-firefox
    container_name: node-firefox
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    networks:
      - grid

networks:
  grid:
    driver: bridge